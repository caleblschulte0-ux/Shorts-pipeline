name: Auto-merge daily packages

# Fires on PRs from claude/* branches (the daily script-writing routine
# opens these). Auto-merges ONLY when the diff is constrained to
# package files — any genuine code change still needs a human merge.
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: startsWith(github.head_ref, 'claude/') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide if auto-merge is safe
        id: check
        run: |
          # Whitelist: PRs whose diff touches only package files OR the
          # gitignore that controls package tracking. Anything else
          # (code, workflows, deps) gets blocked so a human still
          # reviews real code changes.
          git fetch origin "${{ github.base_ref }}"
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          if [ -z "$files" ]; then
            echo "No files changed; skipping."
            echo "safe=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Changed files:"
          printf '  %s\n' $files
          safe=1
          for f in $files; do
            case "$f" in
              state/trending_packages/*) ;;
              .gitignore) ;;
              *)
                safe=0
                echo "::notice::Blocking auto-merge: $f is outside the package whitelist"
                break ;;
            esac
          done
          echo "safe=$safe" >> $GITHUB_OUTPUT

      - name: Squash-merge
        if: steps.check.outputs.safe == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash --delete-branch
