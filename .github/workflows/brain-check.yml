name: Brain Check

# 60-second connectivity test for the brain: does the CLAUDE_CODE_OAUTH_TOKEN
# repo secret authenticate a headless Claude Code call? No render, no python
# deps — just install the CLI and ask for one word back.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Headless Claude auth test
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::secret CLAUDE_CODE_OAUTH_TOKEN is not set"
            exit 1
          fi
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          set +e
          OUT=$(timeout 120 claude -p "Reply with exactly: BRAIN_CONNECTED" \
                --model sonnet --output-format text 2>&1)
          RC=$?
          set -e
          echo "claude exit=$RC output: $OUT"
          if [ $RC -eq 0 ] && echo "$OUT" | grep -q "BRAIN_CONNECTED"; then
            echo "::notice::BRAIN CONNECTED — token authenticates headless Claude."
          else
            echo "::error::brain auth failed — see output above (401 = bad token value)"
            exit 1
          fi
