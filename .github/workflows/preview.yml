name: Preview Render (no upload)

# Renders the currently-committed package slate to downloadable .mp4
# artifacts WITHOUT publishing to YouTube. Use this to actually watch the
# output before it ships — the daily workflow uploads straight to YouTube,
# which makes blind quality iteration painful.
#
# Two ways to fire:
#   1. Actions tab -> "Preview Render (no upload)" -> Run workflow, pick the
#      branch you want to render (the render uses that branch's CODE +
#      committed packages).
#   2. Push a change to .github/triggers/preview on any branch. Bump that
#      file (e.g. `date > .github/triggers/preview`) when you want a fresh
#      render of the current branch without opening the Actions UI.
#
# The job runs `run_trending_daily.py --dry-run`, which renders the
# pre-written packages and skips the upload step entirely (the YouTube
# uploader is only imported on the non-dry-run path), so none of the
# YOUTUBE_* secrets are required here.

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many packages to render'
        required: false
        default: '6'
  push:
    paths:
      - '.github/triggers/preview'

permissions:
  contents: read

concurrency:
  # Separate from the daily publish lane so a preview never blocks a real
  # run (and vice-versa). Newer preview pushes cancel older in-flight ones.
  group: preview-render-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -q ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Kokoro TTS models (~350MB)
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-v1.0

      - name: Download Kokoro TTS models if cache miss
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro_models
          curl -fsSL -o kokoro_models/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          curl -fsSL -o kokoro_models/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"
          ls -lh kokoro_models/

      - name: Cache gameplay clips
        id: cache-gameplay
        uses: actions/cache@v4
        with:
          path: gameplay/
          key: gameplay-${{ hashFiles('seed_gameplay.py') }}

      - name: Seed gameplay clips
        run: |
          python seed_gameplay.py

      - name: Render packages (dry-run, no upload)
        id: render
        env:
          # Media-sourcing keys only. NO YouTube secrets — dry-run never
          # uploads. Each optional provider skips silently if unset; the
          # render still works, but coverage (and the relevance gate's
          # pass rate) tracks whatever keys are present, exactly like the
          # real daily run.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          VIMEO_TOKEN: ${{ secrets.VIMEO_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DVIDS_API_KEY: ${{ secrets.DVIDS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          BRAVE_KEY: ${{ secrets.BRAVE_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          NEWSDATA_KEY: ${{ secrets.NEWSDATA_KEY }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          TOPIC_VIDEO_ALLOW_STRIKES: ${{ vars.TOPIC_VIDEO_ALLOW_STRIKES }}
          KOKORO_VOICE: ${{ vars.KOKORO_VOICE || 'am_adam' }}
          COUNT: ${{ github.event.inputs.count || '6' }}
        run: |
          echo "Rendering $COUNT package(s) with --dry-run (no upload)"
          python scripts/run_trending_daily.py --count "$COUNT" --dry-run

      - name: List rendered output
        if: always()
        run: |
          echo "=== output/ ==="
          ls -lh output/ 2>/dev/null || echo "(no output dir)"

      - name: Upload rendered videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-videos
          # The .mp4s are the deliverable; the .audit.json sidecars let you
          # see which media source won each shot (operator image / news
          # funnel / topic video / stock) when something still looks off.
          path: |
            output/*.mp4
            output/*.audit.json
            daily_report.md
          if-no-files-found: warn
          retention-days: 14
