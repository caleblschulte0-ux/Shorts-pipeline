name: Generate Mascot Art

# Manual trigger only — calls Gemini's image-generation model with the
# character-locked prompts (teal monster professor; anchor pose fed back
# as an image reference so the poses stay on-character) and pushes the
# resulting PNGs to a branch + draft PR for visual review. The PR is
# intentionally DRAFT so auto-merge.yml skips it; the user marks it ready
# when the art passes the smell test.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image-gen deps
        run: |
          pip install --quiet google-genai pillow rembg onnxruntime

      - name: Run the generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set in this repo"
            exit 1
          fi
          python3 scripts/generate_mascot_gemini.py

      - name: Commit + push to a fresh branch
        id: push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="claude/mascot-art-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git add assets/mascot/anchor/
          if git diff --cached --quiet; then
            echo "no changes to commit — Gemini call may have failed silently"
            exit 1
          fi
          git commit -m "mascot: Gemini-generated teal-professor pose set (auto)"
          git push -u origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.push.outputs.branch }}" \
            --draft \
            --title "[DRAFT] mascot: Gemini-generated teal-professor art" \
            --body "Generated by \`generate-mascot.yml\`. Marked DRAFT on purpose so auto-merge.yml skips it — review the PNGs (idle/point/shock/laugh/think/cheer/duck/ride) and mark the PR Ready when the art passes the smell test. Re-run the workflow to regenerate; that opens a new draft PR each time."
