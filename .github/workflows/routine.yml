name: Daily Routine

# ONE reliable kick for ALL THREE channels. The old chain
# (Claude PR -> Auto-merge -> gh workflow run daily.yml -> workflow_run cascade
# to Explainer + Third) breaks whenever the morning PR doesn't touch today's
# package folder, so nothing fires. This routine instead dispatches each
# channel DIRECTLY every morning. workflow_dispatch is exempt from GitHub's
# anti-cascade rule (unlike workflow_run), so github.token can fire them.
# Each channel is idempotent (posted-log dedupe), so overlap with a channel's
# own fallback cron simply no-ops.

on:
  workflow_dispatch: {}
  schedule:
    # 11:30 UTC — the unified morning kick. Runs before the channels' own
    # fallback crons so it is the primary trigger; those crons stay as backup.
    - cron: '30 11 * * *'

permissions:
  actions: write          # required for `gh workflow run` to dispatch the channels

jobs:
  kickoff:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Kick off Shorts (Daily Shorts)
        run: gh workflow run daily.yml --repo "$REPO" --ref main || echo "daily dispatch failed"

      - name: Kick off Explainer (scheduled slate)
        run: |
          gh workflow run explainer.yml --repo "$REPO" --ref main \
            -f mode=schedule -f every_hours=4 -f start_in_hours=0 -f topup=6 \
            || echo "explainer dispatch failed"

      - name: Kick off Twitch clip (Third Channel)
        run: gh workflow run third.yml --repo "$REPO" --ref main || echo "third dispatch failed"

      - name: Summary
        run: echo "Dispatched Daily Shorts + Explainer (schedule) + Third Channel."
