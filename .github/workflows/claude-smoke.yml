name: Claude smoke test
on:
  workflow_dispatch:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Verify token works
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is NOT set"; exit 1
          fi
          echo "token is present; calling Claude headless..."
          claude --version || true
          OUT=$(claude -p "Reply with exactly this and nothing else: SHORTS_TOKEN_OK" 2>&1) || true
          echo "----- Claude replied: -----"
          echo "$OUT"
          echo "---------------------------"
          echo "$OUT" | grep -q "SHORTS_TOKEN_OK" && echo "RESULT: CLAUDE WORKS ✅" || echo "RESULT: something off — see reply above"
