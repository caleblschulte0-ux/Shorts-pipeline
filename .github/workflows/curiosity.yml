name: Curiosity Long-form

# Posts the EVERGREEN visual-curiosity LONG-FORM videos (4-5 min, 1920x1080,
# main watch feed — NOT Shorts) to the OpenRangeInteractive channel.
# CURIOSITY_BRAIN.md is the doctrine. Fully separate from daily.yml /
# explainer.yml / third.yml: own config (data_learning/curiosity.config.json),
# own renderer (data_learning/longform_render.py), own posted-log
# (state/curiosity_posted_log.json), own token secret, own concurrency group.
#
# Cadence: 1/week (Saturdays 15:00 UTC) — the cron posts at most ONE un-posted
# story per run. The daily Claude routine keeps the queue stocked
# (CLAUDE_ROUTINE_INSTRUCTIONS.md Part 3).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'verify | canary | schedule | all | preview'
        required: true
        default: 'verify'
        type: choice
        options: [verify, canary, schedule, all, preview]
      canary_slug:
        description: 'slug to post in canary mode'
        required: false
        default: 'kola-deepest-hole'
      slugs:
        description: 'space-separated slugs (blank = un-posted, config order)'
        required: false
        default: ''
      expected_channel:
        description: 'channel guard override (blank = OpenRangeInteractive)'
        required: false
        default: ''
      max:
        description: 'schedule: post at most N stories this run'
        required: false
        default: '1'
      publish_in_hours:
        description: 'schedule the upload N hours out (0 = public now)'
        required: false
        default: '0'
      force:
        description: 're-post even if already in the posted-log'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  # Weekly cadence — long-form is a catalog play, not a firehose.
  schedule:
    - cron: '0 15 * * 6'

permissions:
  contents: write          # persist state/curiosity_posted_log.json

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Cheap gate: on the cron, only spin up the heavy render job if there is
  # actually something un-posted to ship.
  plan:
    runs-on: ubuntu-latest
    outputs:
      new_count: ${{ steps.count.outputs.new_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Count un-posted stories
        id: count
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          cfg = json.load(open('data_learning/curiosity.config.json'))
          posted = set()
          p = 'state/curiosity_posted_log.json'
          if os.path.exists(p):
              posted = set(json.load(open(p)).get('posted', {}))
          new = [s['slug'] for s in cfg.get('stories', []) if s['slug'] not in posted]
          print('new_count=' + str(len(new)))
          PY
          echo "::notice::un-posted curiosity stories: $(grep new_count "$GITHUB_OUTPUT" | tail -1)"

  curiosity:
    needs: plan
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && needs.plan.outputs.new_count != '0')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: curiosity-longform
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Pre-flight — kill switch + secrets + channel guard
        env:
          YT_CLIENT: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          # Canonical name first; _ORI accepted as the operator-created alias.
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON_CURIOSITY || secrets.YOUTUBE_TOKEN_JSON_ORI }}
          # Hard default to the real channel (OpenRangeInteractive / @ORI);
          # repo var CURIOSITY_EXPECTED_CHANNEL can override if renamed.
          EXPECTED: ${{ inputs.expected_channel || vars.CURIOSITY_EXPECTED_CHANNEL || 'OpenRangeInteractive' }}
        run: |
          [ -f PAUSED ] && { echo "Pipeline paused (PAUSED file)"; exit 1; }
          MODE="${{ inputs.mode }}"; [ -z "$MODE" ] && MODE="auto"
          # verify/preview never upload, so they may run without upload wiring
          if [ "$MODE" != "verify" ] && [ "$MODE" != "preview" ]; then
            missing=0
            [ -z "$YT_CLIENT" ] && { echo "::error::missing secret YOUTUBE_CLIENT_SECRETS_JSON"; missing=1; }
            [ -z "$YT_TOKEN" ] && { echo "::error::missing secret YOUTUBE_TOKEN_JSON_CURIOSITY (or its alias YOUTUBE_TOKEN_JSON_ORI) — mint it with setup_youtube.py signed into the OpenRangeInteractive account"; missing=1; }
            [ -z "$EXPECTED" ] && { echo "::error::channel guard is empty — set CURIOSITY_EXPECTED_CHANNEL"; missing=1; }
            [ $missing -ne 0 ] && exit 1
          fi
          echo "Pre-flight OK."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system deps
        # blender: the headless Cycles hero-shot renderer (blender -b);
        # pango/cairo dev libs: manimpango build deps for Manim.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -q ffmpeg blender libpango1.0-dev libcairo2-dev pkg-config
          blender --version | head -1

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          # Ubuntu's debian-patched setuptools breaks sdist builds (srt, a
          # manim dep) with "AttributeError: install_layout" — replace it.
          pip install --ignore-installed --upgrade setuptools wheel
          pip install -r requirements.txt -r data_learning/requirements.txt
          # Manim animates the data beats (curiosity_scenes.py). TeX-free by
          # design — do NOT add a LaTeX install here.
          pip install --quiet manim || echo "::warning::manim install failed — beats degrade to stills"
          pip install --quiet rembg || echo "rembg install failed (chroma fallback)"

      - name: Cache rembg model (~170MB)
        if: inputs.mode != 'verify'
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-u2net-v1

      - name: Cache Kokoro TTS models (~350MB)
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-v1.0

      - name: Download Kokoro TTS models if cache miss
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro_models
          curl -fsSL -o kokoro_models/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          curl -fsSL -o kokoro_models/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"

      # Royalty-free music library (Kevin MacLeod, CC-BY) for the music bed.
      - name: Cache music library (~110MB)
        if: inputs.mode != 'verify'
        id: cache-music
        uses: actions/cache@v4
        with:
          path: data_learning/music/
          key: music-kmcl-${{ hashFiles('scripts/fetch_music.py') }}

      - name: Fetch music if missing
        if: inputs.mode != 'verify' && steps.cache-music.outputs.cache-hit != 'true'
        run: python3 scripts/fetch_music.py

      - name: Run
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          # uploader(channel="curiosity") reads this env var; the secret may
          # live under either name (_ORI is the operator-created alias).
          YOUTUBE_TOKEN_JSON_CURIOSITY: ${{ secrets.YOUTUBE_TOKEN_JSON_CURIOSITY || secrets.YOUTUBE_TOKEN_JSON_ORI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          MODE="${{ inputs.mode }}";                 [ -z "$MODE" ] && MODE="auto"
          EXPECTED="${{ inputs.expected_channel }}"
          [ -z "$EXPECTED" ] && EXPECTED="${{ vars.CURIOSITY_EXPECTED_CHANNEL }}"
          [ -z "$EXPECTED" ] && EXPECTED="OpenRangeInteractive"
          MAX="${{ inputs.max }}";                   [ -z "$MAX" ] && MAX="1"
          PUB="${{ inputs.publish_in_hours }}";      [ -z "$PUB" ] && PUB="0"
          SLUGS="$(echo "${{ inputs.slugs }}" | tr ',' ' ' | tr -s ' ')"
          SLUGS="${SLUGS#"${SLUGS%%[![:space:]]*}"}"
          SLUGFLAG=""; [ -n "$SLUGS" ] && SLUGFLAG="--slugs $SLUGS"
          FORCEFLAG=""; [ "${{ inputs.force }}" = "true" ] && FORCEFLAG="--force"
          export YOUTUBE_EXPECTED_CHANNEL="$EXPECTED"
          echo "mode=$MODE expected=$EXPECTED max=$MAX publish_in=$PUB slugs='${SLUGS:-<un-posted>}'"
          case "$MODE" in
            verify)
              python scripts/post_curiosity.py --check-channel ;;
            canary)
              python scripts/post_curiosity.py --slugs "${{ inputs.canary_slug }}" --max 1 ;;
            schedule)
              python scripts/post_curiosity.py $SLUGFLAG $FORCEFLAG \
                --max "$MAX" --publish-in-hours "$PUB" ;;
            all)
              python scripts/post_curiosity.py $SLUGFLAG $FORCEFLAG ;;
            preview)
              # Render to a file and commit it back to THIS branch so it can
              # be eyeballed before anything posts. No upload.
              mkdir -p preview
              for s in $SLUGS; do
                python -m data_learning.longform_render --slug "$s" \
                  --out "preview/$s.mp4"
              done
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -f preview/*.mp4 preview/*.jpg preview/*.meta.json 2>/dev/null || git add -f preview/*.mp4
              git commit -m "curiosity preview render: $SLUGS [skip ci]" || echo "nothing to commit"
              for i in 1 2 3 4 5; do
                git push origin "HEAD:${GITHUB_REF_NAME}" && { echo "pushed on attempt $i"; break; }
                echo "push failed on attempt $i, rebasing (autostash, ours)..."
                git pull --rebase --autostash -X ours origin "${GITHUB_REF_NAME}" \
                  || git rebase --abort || true
                sleep 2
              done ;;
            auto)
              # weekly cron: post exactly one un-posted story
              python scripts/post_curiosity.py --max 1 ;;
          esac

      # Pull view/like counts so the daily routine learns which pillars and
      # hooks land (state/analytics_curiosity/latest.json).
      - name: Fetch curiosity analytics
        if: always() && inputs.mode != 'verify' && inputs.mode != 'preview'
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON_CURIOSITY: ${{ secrets.YOUTUBE_TOKEN_JSON_CURIOSITY || secrets.YOUTUBE_TOKEN_JSON_ORI }}
        run: |
          python3 scripts/fetch_analytics.py --channel curiosity --max-age-days 90 \
            || { echo "analytics fetch skipped"; exit 0; }

      - name: Persist posted log + analytics
        if: always() && inputs.mode != 'verify' && inputs.mode != 'preview'
        run: |
          git add state/curiosity_posted_log.json state/analytics_curiosity state/translation_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "curiosity: update posted log + analytics [skip ci]"
          # Robust push (same hardening as explainer.yml): --autostash rides
          # over render-dirtied files, -X ours keeps our fresh log on a race,
          # retries ride out concurrent pushes from scout/daily.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing (autostash, ours)..."
            git pull --rebase --autostash -X ours origin main || git rebase --abort || true
            sleep 2
          done
          echo "::error::Failed to persist posted log after 5 attempts"
          exit 1
