name: Gemini image diagnostic

# One-off: probe what image generation the GEMINI_API_KEY secret can actually do.
# Manual only; writes nothing back.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK
        run: pip install --quiet google-genai
      - name: Probe image models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/diag_gemini.py
