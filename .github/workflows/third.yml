name: Third Channel (Proof Mode)

# Fully isolated from daily.yml / explainer.yml (THIRD_BRAIN.md §13):
# own packages dir, own posted log, own token secret, own concurrency
# group. Renders Proof Mode packages by EXECUTING their capture spec
# for real and composing the video from the recorded proof ledger.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Package date folder (YYYYMMDD, default today UTC)'
        required: false
        default: ''
      dry_run:
        description: 'Render only, do NOT upload'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'state/third_packages/**'
  # Daily slate: packages synthesize from state/third_packages/default_clip.json
  # when no authored packages exist for the day. NO git cron — the morning
  # kickoff is a Claude Routine that dispatches this workflow directly each day.
  # Chain off "Daily Shorts" the SAME way explainer.yml does, so one kickoff of
  # daily.yml (the morning Claude Routine → workflow_dispatch) cascades to all
  # THREE channels. Safe to run alongside the cron above: run_third.py
  # synthesizes deterministic per-day slugs (clip-YYYYMMDD-N) and skips any slug
  # already in the posted log, so a second same-day run no-ops. The cron stays
  # as the reliable fallback because GitHub does not cascade workflow_run ->
  # workflow_run (a workflow_dispatch of daily.yml DOES fire this chain).
  workflow_run:
    workflows: ["Daily Shorts"]
    types: [completed]
    branches: [main]

permissions:
  contents: write   # commit third_posted_log.json

env:
  PYTHON_VERSION: '3.11'

jobs:
  third:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # slot-retries can render extra clips per slot
    # On a chain fire (workflow_run) only run when Daily Shorts actually
    # succeeded; all other triggers (dispatch, schedule, push) always run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: third-shorts
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # DEDUPE FRESHNESS (fix for duplicate uploads): actions/checkout pins to
      # the TRIGGERING commit SHA. Under the `third-shorts` concurrency queue a
      # run can be triggered early but execute late — after another run already
      # committed new posts — so its checked-out posted log is STALE and it
      # re-picks a clip that's already up (union-merge on commit then keeps
      # both). Pull the newest committed dedupe state from origin/main BEFORE
      # run_third selects, so posted_keys always reflects every prior post.
      - name: Sync dedupe state from main
        run: |
          git fetch origin main --depth=1 || true
          git checkout origin/main -- \
            state/third_posted_log.json state/third_qa_stats.json 2>/dev/null \
            || echo "no committed dedupe state yet — first run"

      - name: Pre-flight — secrets + kill switch
        run: |
          set -e
          [ -f PAUSED ] && { echo "Pipeline paused (PAUSED file)"; exit 1; }
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            [ -z "${{ secrets.YOUTUBE_TOKEN_JSON_THIRD }}" ] && {
              echo "::error::missing secret YOUTUBE_TOKEN_JSON_THIRD — mint it with setup_youtube.py signed into the third channel's account"; exit 1; }
            [ -z "${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}" ] && {
              echo "::error::missing secret YOUTUBE_CLIENT_SECRETS_JSON"; exit 1; }
          fi
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg miller fonts-dejavu-core

      - name: Install python deps
        # curl_cffi powers yt-dlp's TLS impersonation for Kick/Rumble.
        # opencv-python-headless<5 drives the auto-editor's face-tracking
        # reframe (5.0 dropped CascadeClassifier from the headless wheel);
        # the reframe is import-guarded, so a missing wheel just falls back
        # to the blur-fill center crop.
        run: pip install -q pillow numpy edge-tts yt-dlp curl_cffi openai-whisper deep-translator google-api-python-client google-auth google-auth-oauthlib "opencv-python-headless<5"

      - name: Install Claude CLI (the author brain)
        # Claude-first authoring, same pattern as daily.yml's brain step;
        # best-effort — the run falls to Groq (loudly) without it.
        run: npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || echo "::warning::claude-code install failed — author falls to Groq"

      # Translation cache (audit Ticket 3): moved out of git into cache/,
      # persisted between runs via actions/cache (evolving-cache pattern).
      - name: Cache translations
        uses: actions/cache@v4
        with:
          path: |
            cache/translation/
            cache/funnel/
            cache/transcripts/
          key: translation-cache-v1-${{ github.run_id }}
          restore-keys: |
            translation-cache-v1-

      - name: Render + upload
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          # channel="third" in the packages routes the uploader to this
          # token; the shared channels' tokens are never referenced here.
          YOUTUBE_TOKEN_JSON_THIRD: ${{ secrets.YOUTUBE_TOKEN_JSON_THIRD }}
          # Groq author writes per-clip titles/hooks/hashtags from the
          # transcript; run degrades to raw clip titles without it
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Claude authors titles/hooks/hashtags (Groq is the loud fallback)
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Twitch Helix (optional): exact clip ages + proper windowing.
          # Discovery falls back to yt-dlp when unset.
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          # ADDITIVE REACH (deep dive #1 lever): cross-post each clip to the
          # TikTok FYP — where our niche's sub-10k-follower accounts hit
          # millions while YouTube's feed starves a cold channel. Optional:
          # unset = YouTube-only (today's behaviour). IG Reels also needs
          # META_ACCESS_TOKEN + IG_USER_ID + REELS_PUBLIC_HOST.
          TIKTOK_ACCESS_TOKEN_THIRD: ${{ secrets.TIKTOK_ACCESS_TOKEN_THIRD }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          REELS_PUBLIC_HOST: ${{ secrets.REELS_PUBLIC_HOST }}
          # Wrong-channel guard: hard default to the real third channel;
          # repo var THIRD_EXPECTED_CHANNEL can override if renamed.
          YOUTUBE_EXPECTED_CHANNEL: ${{ vars.THIRD_EXPECTED_CHANNEL || 'Thirdbraindown' }}
        run: |
          set -e
          DATE="${{ inputs.date }}"
          [ -z "$DATE" ] && DATE=$(date -u +%Y%m%d)
          FLAGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="--dry-run"
          python scripts/run_third.py --date "$DATE" $FLAGS

      # Feedback loop: pull each posted Short's views-per-hour + (when the
      # token carries the yt-analytics scope) retention, so run_third's
      # learned prior can favour the streamers that actually retain on OUR
      # channel — not just spread on Twitch. Best-effort: a missing scope or
      # a quota blip degrades to velocity+banger, never fails the run.
      - name: Fetch third analytics
        if: ${{ always() && inputs.dry_run != true }}
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON_THIRD: ${{ secrets.YOUTUBE_TOKEN_JSON_THIRD }}
        run: |
          python3 scripts/fetch_analytics.py --channel third --max-age-days 30 \
            || { echo "analytics fetch skipped"; exit 0; }

      - name: Commit posted log + analytics
        # always() so the log lands even when the render step fails —
        # losing dedupe state causes re-uploads (batch-3 incident). Uses the
        # shared hardened persist (audit Ticket 1): retry + union-merge on a
        # race, so the naive single-retry path that caused batch-3 is gone.
        if: ${{ always() && inputs.dry_run != true }}
        run: |
          bash scripts/ci_commit_state.sh \
            "third: update posted log + analytics [skip ci]" \
            state/third_posted_log.json state/third_qa_stats.json \
            state/analytics_third
