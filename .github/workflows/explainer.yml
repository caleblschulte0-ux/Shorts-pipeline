name: Explainer Stories

# Posts the curated data-explainer STORY shorts to the second channel
# (short_explainer67). Fully separate from daily.yml (which posts the trending
# shorts to the other channel): different script, different token secret,
# different posted-log, channel guard.
#
# Two ways to run:
#   * manual (workflow_dispatch): verify / canary / schedule / all
#   * automatic (workflow_run): after "Auto-merge claude PRs" merges the daily
#     PR, this fires and posts any NEW (un-posted) stories the daily routine
#     authored — scheduled hourly. The posted-log dedupes, so it's idempotent.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'verify | canary | schedule | all | unpublish | preview | author'
        required: true
        default: 'verify'
        type: choice
        options: [verify, canary, schedule, all, unpublish, preview, author]
      canary_slug:
        description: 'slug to post in canary mode'
        required: false
        default: 'debt-trap'
      slugs:
        description: 'space-separated slugs (blank = every story in config)'
        required: false
        default: ''
      expected_channel:
        description: 'channel guard (blank defaults to short_explainer67)'
        required: false
        default: ''
      every_hours:
        description: 'schedule/auto: hours between uploads (spaced out)'
        required: false
        default: '6'
      start_in_hours:
        description: 'schedule/auto: hours from now until the first upload'
        required: false
        default: '1'
      force:
        description: 're-post even if already in the posted-log (new-look re-render)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      topup:
        description: 'keep at least this many un-posted stories (auto-author to refill)'
        required: false
        default: '6'
  # Chain off "Daily Shorts" (runs on main, so branches:[main] matches): after
  # each daily batch, render + post any un-posted explainer stories. The plan
  # job no-ops when there's nothing new, so chaining every daily run is cheap.
  workflow_run:
    workflows: ["Daily Shorts"]
    types: [completed]
    branches: [main]
  # RELIABLE fallback: a daily cron. GitHub does NOT reliably cascade
  # workflow_run -> workflow_run (when Daily Shorts is itself workflow_run-
  # triggered, the chain above silently never fires), so this cron is the real
  # guarantee. Runs after the morning daily batch; MODE defaults to "auto",
  # which posts every un-posted story (deduped). 13:00 UTC daily.
  schedule:
    - cron: '0 13 * * *'

permissions:
  contents: write          # persist state/explainer_posted_log.json

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Cheap gate: on an automatic (workflow_run) fire, only spin up the heavy
  # render job if the daily routine actually added new stories.
  plan:
    runs-on: ubuntu-latest
    outputs:
      new_count: ${{ steps.count.outputs.new_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Count un-posted stories
        id: count
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          cfg = json.load(open('data_learning/niche.config.json'))
          posted = set()
          p = 'state/explainer_posted_log.json'
          if os.path.exists(p):
              posted = set(json.load(open(p)).get('posted', {}))
          new = [s['slug'] for s in cfg.get('stories', []) if s['slug'] not in posted]
          print('new_count=' + str(len(new)))
          PY
          echo "::notice::un-posted explainer stories: $(grep new_count "$GITHUB_OUTPUT" | tail -1)"

  explainer:
    needs: plan
    # Manual dispatch always runs. The daily CRON always runs too — even with an
    # empty queue — because the author step refills it before posting (that's how
    # the channel keeps inventing new topics instead of going dry). The Daily
    # Shorts chain still only fires when there's already something to post.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (needs.plan.outputs.new_count != '0' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: explainer-stories
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -q ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r data_learning/requirements.txt
          # rembg: reliable background removal for the illustrated 'diorama'
          # cut-outs (onnxruntime is already present for Kokoro).
          pip install --quiet rembg || echo "rembg install failed (chroma fallback)"

      - name: Cache rembg model (~170MB)
        if: inputs.mode != 'verify'
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-u2net-v1

      - name: Cache Kokoro TTS models (~350MB)
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-v1.0

      - name: Download Kokoro TTS models if cache miss
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro_models
          curl -fsSL -o kokoro_models/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          curl -fsSL -o kokoro_models/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"

      # The round-robin bottom-strip clips are gitignored (large). Cache them
      # keyed on the generator so they only rebuild when broll_gen.py changes.
      - name: Cache b-roll strip clips
        if: inputs.mode != 'verify'
        id: cache-broll
        uses: actions/cache@v4
        with:
          path: data_learning/broll/styles/
          key: broll-styles-${{ hashFiles('data_learning/broll_gen.py') }}

      - name: Build b-roll strip clips if missing
        if: inputs.mode != 'verify' && steps.cache-broll.outputs.cache-hit != 'true'
        run: |
          python -m data_learning.broll_gen --styles --clip-seconds 45

      # Royalty-free music library (Kevin MacLeod, CC-BY), cached on the track
      # list so it only re-downloads when fetch_music.py changes.
      - name: Cache music library (~110MB)
        if: inputs.mode != 'verify'
        id: cache-music
        uses: actions/cache@v4
        with:
          path: data_learning/music/
          key: music-kmcl-${{ hashFiles('scripts/fetch_music.py') }}

      - name: Fetch music if missing
        if: inputs.mode != 'verify' && steps.cache-music.outputs.cache-hit != 'true'
        run: python3 scripts/fetch_music.py

      - name: Verify required secrets are set
        env:
          YT_CLIENT: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON_EXPLAINER }}
        run: |
          missing=0
          [ -z "$YT_CLIENT" ] && { echo "::error::missing secret YOUTUBE_CLIENT_SECRETS_JSON"; missing=1; }
          [ -z "$YT_TOKEN" ] && { echo "::error::missing secret YOUTUBE_TOKEN_JSON_EXPLAINER"; missing=1; }
          [ $missing -ne 0 ] && exit 1
          echo "Secrets present."

      # THE BRAIN. Runs CLAUDE (the Claude Code CLI, authed by the operator's
      # subscription via CLAUDE_CODE_OAUTH_TOKEN — NOT an API key) right before we
      # render, so Claude itself invents the depiction for every data point and
      # writes it into the config. This is "be the brain at the moment of
      # rendering." Skips gracefully if the token isn't set (-> baked / determ.).
      - name: Claude invents the depictions (the brain)
        if: inputs.mode != 'verify' && inputs.mode != 'unpublish'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BRAIN_MODEL: ${{ vars.BRAIN_MODEL }}
          RAW_SLUGS: ${{ inputs.slugs }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — skipping the brain (renders use baked/deterministic depictions). Add it with 'claude setup-token'."
            exit 0
          fi
          # Which stories are about to render? The given slugs, else the un-posted
          # queue (what a blank-slug schedule/auto run will post).
          BRAIN_SLUGS="$(echo "$RAW_SLUGS" | tr ',' ' ' | tr -s ' ')"
          if [ -z "$(echo "$BRAIN_SLUGS" | tr -d ' ')" ]; then
            BRAIN_SLUGS="$(python3 - <<'PY'
          import json, os
          cfg = json.load(open('data_learning/niche.config.json'))
          posted = set()
          p = 'state/explainer_posted_log.json'
          if os.path.exists(p):
              posted = set(json.load(open(p)).get('posted', {}))
          print(' '.join(s['slug'] for s in cfg['stories'] if s['slug'] not in posted))
          PY
          )"
          fi
          BRAIN_SLUGS="$(echo "$BRAIN_SLUGS" | tr -s ' ' | sed 's/^ *//;s/ *$//')"
          if [ -z "$BRAIN_SLUGS" ]; then echo "no target stories; skipping brain"; exit 0; fi
          echo "brain targets: $BRAIN_SLUGS"
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || \
            { echo "::warning::claude CLI install failed — skipping brain"; exit 0; }
          MODEL="${BRAIN_MODEL:-sonnet}"
          PROMPT="$(cat <<BRAINPROMPT
          You are the BRAIN of this data-shorts channel: creative director, coder,
          and quality gate in one. FIRST read data_learning/VIZ_BRAIN.md — it is
          your complete playbook (toolkit, hard rules, QA checklist, schemas).
          Work on ONLY these story slugs: ${BRAIN_SLUGS}. Then:
          1. LEARN FIRST: read data_learning/LEARNING_LOOP.md (shared learning
             doctrine) and state/brain_context.json (apply its directives and
             guardrails - especially the 100-view adaptation floor). Then per
             the LEARNING LEDGER: load state/video_ledger.json +
             state/analytics_explainer, retrieve the ~10 most SIMILAR past
             videos (same topic/hook-type/franchise, not top overall), score
             them on the STAGED SCORECARD (name the failing stage: exposure/
             hook/body/ending/satisfaction/expansion), and reason explicitly
             before you direct anything.
          2. For EACH segment of each target story, read its data file and invent
             the most creative depiction of THAT data — prefer a brand-new
             procedural mechanic; else compose from the element kit; a classic
             chart (segment 'viz' field) is welcome variety when it reads better.
             Apply the MEDIA JUDGMENT and VARIETY sections of the playbook.
             Write it to the segment in data_learning/niche.config.json.
             Never a plain bar, a bubble, or a bare number.
          3. Direct the whole video: sharpen hook / say / closing / question so
             they speak the exact numbers the scenes show.
          4. Run 'python scripts/validate_scenes.py ${BRAIN_SLUGS}' and fix until
             it prints OK.
          5. LOOK at your work: run 'python scripts/render_frames.py
             ${BRAIN_SLUGS} --out preview/frames --motion' and Read the PNGs —
             final frames AND the 25/50/75 percent motion samples. Judge against
             the RETENTION DOCTRINE (does something change every beat? first
             second earns the view? reads muted?) and the frame checklist; fix
             and re-render until every segment passes. Do not skip this.
          6. Save good new mechanics to data_learning/viz_mechanics.json; star the
             exceptional ones. Apply the HOOK DOCTRINE: curiosity-first hooks,
             movement in the first second, max ~7-10 words readable per moment,
             and an ending that surprises (escalate/invert/consequence) — never
             a summary.
          7. RECORD: append each directed video's creative fingerprint WITH its
             shot timeline (hook/punches/visual swaps/captions/payoff/CTA
             timestamps) to state/video_ledger.json, and make bounded updates to
             state/brain_context.json (weights/rules-of-thumb only; obey its
             guardrails; playbook-rule changes are operator-reviewed, not yours
             to make silently).
          Do NOT modify stories outside the target slugs. Finish with a 6-line
          summary: evidence from similar past videos, depictions chosen per
          story, hook/ending choices, QA fixes.
          BRAINPROMPT
          )"
          # Bounded so a stuck brain can't blow the 60-min job cap; non-fatal so a
          # brain hiccup still lets the render proceed on the prior depictions.
          timeout 1500 claude -p "$PROMPT" \
            --allowedTools "Read,Edit,Write,Bash" \
            --model "$MODEL" \
            --permission-mode acceptEdits \
            --output-format text || \
            echo "::warning::brain step did not finish cleanly — rendering with current depictions"
          echo "--- brain validation ---"
          python scripts/validate_scenes.py $BRAIN_SLUGS || \
            echo "::warning::some scenes still invalid — renderer will fall back for those"

      - name: Run
        env:
          # The BRAIN step above already invented the depictions with Claude and
          # baked them into the config, so the renderer just RENDERS them — no
          # render-time LLM API calls. (Set VIZ_INVENT=1 to also let the render
          # fall over to a Groq/Gemini API invention when no brain ran.)
          VIZ_INVENT: '0'
          # Native multi-channel routing: post_stories uses channel "explainer",
          # so the uploader reads YOUTUBE_TOKEN_JSON_EXPLAINER. The original
          # YOUTUBE_TOKEN_JSON (other channel) is never referenced here.
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON_EXPLAINER: ${{ secrets.YOUTUBE_TOKEN_JSON_EXPLAINER }}
          # LLM key for the auto-localization layer (translates titles/
          # descriptions into 12 languages on every upload).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Image-gen key for cinematic AI scene/hook backgrounds (free-tier,
          # graceful fallback to stock/designed if unset or quota-limited).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CLAUDE is the creative director: it INVENTS each depiction/mechanic at
          # render time (viz_director._llm_try prefers Anthropic). Paid, so it
          # doesn't hit the free-tier 429s that were dropping the invention. If the
          # secret is unset this is empty -> the director falls over to Gemini/Groq.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          MODE="${{ inputs.mode }}";                 [ -z "$MODE" ] && MODE="auto"
          EXPECTED="${{ inputs.expected_channel }}"; [ -z "$EXPECTED" ] && EXPECTED="short_explainer67"
          EVERY="${{ inputs.every_hours }}";         [ -z "$EVERY" ] && EVERY="6"
          START="${{ inputs.start_in_hours }}";      [ -z "$START" ] && START="1"
          # Accept slugs comma- AND/OR space-separated; the scripts take them
          # space-separated (nargs), so normalise commas to spaces. Without this
          # a comma batch is read as one bogus slug and silently skipped.
          SLUGS="$(echo "${{ inputs.slugs }}" | tr ',' ' ' | tr -s ' ')"
          SLUGS="${SLUGS#"${SLUGS%%[![:space:]]*}"}"   # strip leading space
          # Blank slugs => omit --slugs entirely, so post_stories targets EVERY
          # story in config and dedupes against the posted-log (i.e. posts all
          # un-posted). No hardcoded slate to fall stale.
          SLUGFLAG=""; [ -n "$SLUGS" ] && SLUGFLAG="--slugs $SLUGS"
          FORCEFLAG=""; [ "${{ inputs.force }}" = "true" ] && FORCEFLAG="--force"
          TOPUP="${{ inputs.topup }}";               [ -z "$TOPUP" ] && TOPUP="6"
          export YOUTUBE_EXPECTED_CHANNEL="$EXPECTED"
          # Keep the queue full: AUTHOR brand-new, non-duplicate stories (with
          # illustrative data) so the channel never runs dry and has to re-post
          # duplicates. Runs for queue-driven modes and the manual 'author' mode.
          # Soft-fails (no LLM key / transient error) so posting still proceeds.
          case "$MODE" in
            author|schedule|auto|all)
              python scripts/author_stories.py --top-up "$TOPUP" \
                || echo "author step skipped (no LLM key or transient error)" ;;
          esac
          # Manual 'author' mode also CREATIVE-DIRECTS the whole back catalogue:
          # the LLM picks the most entertaining depiction for every existing
          # story's segments (viz + params). One-shot level-up; soft-fails.
          if [ "$MODE" = "author" ]; then
            python scripts/author_stories.py --backfill \
              || echo "backfill skipped (no LLM key or transient error)"
          fi
          # Self-heal any un-renderable chart specs (single-point "comparison"
          # charts the package generator sometimes emits) before we render, so
          # the channel can never ship a broken/duplicated bar chart again.
          python scripts/normalize_charts.py || echo "normalize skipped"
          echo "mode=$MODE expected=$EXPECTED every=$EVERY start=$START slugs='${SLUGS:-<all un-posted>}'"
          case "$MODE" in
            author)
              echo "author-only mode: queue topped up to >=$TOPUP un-posted, not posting." ;;
            verify)
              python scripts/post_stories.py --check-channel ;;
            canary)
              python scripts/post_stories.py --slugs "${{ inputs.canary_slug }}" ;;
            schedule)
              python scripts/post_stories.py $SLUGFLAG $FORCEFLAG \
                --every-hours "$EVERY" --start-in-hours "$START" ;;
            all)
              python scripts/post_stories.py $SLUGFLAG ;;
            unpublish)
              # Take down the given videos (public or scheduled) + prune the log.
              python scripts/unpublish_stories.py --slugs $SLUGS ;;
            preview)
              # Render to a file and commit it back to THIS branch so the new
              # opening can be eyeballed before anything is posted. No upload.
              mkdir -p preview
              for s in $SLUGS; do
                python data_learning/studio_render.py --slug "$s" --out "preview/$s.mp4"
              done
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -f preview/*.mp4
              git commit -m "preview render: $SLUGS [skip ci]" || echo "nothing to commit"
              # Robust push: the render leaves other files dirty (normalize_charts
              # rewrites niche.config.json) so a plain rebase aborts with "unstaged
              # changes"; --autostash + -X ours + retry rides that out and any
              # concurrent push, so the rendered previews actually reach the branch.
              for i in 1 2 3 4 5; do
                git push origin "HEAD:${GITHUB_REF_NAME}" && { echo "pushed on attempt $i"; break; }
                echo "push failed on attempt $i, rebasing (autostash, ours)..."
                git pull --rebase --autostash -X ours origin "${GITHUB_REF_NAME}" \
                  || git rebase --abort || true
                sleep 2
              done ;;
            auto)
              # post every un-posted story (no --slugs => all, deduped), hourly
              python scripts/post_stories.py --every-hours "$EVERY" --start-in-hours "$START" ;;
          esac

      # Pull view/like counts for the channel's published videos so the daily
      # routine learns which hooks/topics land (feedback loop, channel #3).
      - name: Fetch explainer analytics
        if: always() && inputs.mode != 'verify' && inputs.mode != 'preview'
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON_EXPLAINER: ${{ secrets.YOUTUBE_TOKEN_JSON_EXPLAINER }}
        run: |
          python3 scripts/fetch_analytics.py --channel explainer --max-age-days 60 \
            || { echo "analytics fetch skipped"; exit 0; }

      - name: Persist posted log + analytics
        if: always() && inputs.mode != 'verify' && inputs.mode != 'preview'
        run: |
          git add state/explainer_posted_log.json state/analytics_explainer state/translation_cache.json 2>/dev/null || true
          # The brain's creative memory: per-video fingerprints joined to
          # analytics so the next direction is evidence-based, not fresh guess.
          git add state/video_ledger.json state/brain_context.json 2>/dev/null || true
          # Persist any freshly AUTHORED stories so they outlive this ephemeral
          # run (the new config entries + their illustrative datasets).
          git add data_learning/niche.config.json data_learning/data 2>/dev/null || true
          # The growing library of AI-invented visual mechanics (learns + compounds).
          git add data_learning/viz_mechanics.json 2>/dev/null || true
          # --cached so brand-new (untracked) files are detected too.
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "explainer: update posted log + analytics [skip ci]"
          # A FAILED save here is exactly what stranded an un-logged upload and
          # let the next auto-run re-post it as a duplicate. Make it robust:
          #  * --autostash: the render step leaves other files dirty
          #    (normalize_charts.py rewrites niche.config.json), which otherwise
          #    aborts the rebase with "unstaged changes".
          #  * -X ours: keep our fresh log on a race with a concurrent push.
          #  * retry loop: ride out concurrent pushes from scout/daily.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing (autostash, ours)..."
            git pull --rebase --autostash -X ours origin main || git rebase --abort || true
            sleep 2
          done
          echo "::error::Failed to persist posted log after 5 attempts"
          exit 1
