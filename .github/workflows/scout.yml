name: Scout Sources

on:
  workflow_dispatch: {}
  schedule:
    # DAILY 05:00 UTC — the scout is the shared TOP-OF-FUNNEL for every
    # channel in this repo: it harvests what the world is paying attention to
    # (search trends, top Wikipedia reads, trending video by category,
    # upcoming observances) and each channel's brain derives its OWN angle
    # from the same pool. Trend signals decay in ~24-48h and the job is
    # free, so daily beats weekly. Runs before the channels' daily crons.
    - cron: '0 5 * * *'
  push:
    branches: [main]
    # No path filter while we're debugging — every push to main fires
    # the scout. Once we confirm Actions is on, we'll narrow it back
    # down so the scout doesn't run on every code change.

permissions:
  contents: write
  issues: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: scout-sources
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scout
        env:
          # YouTube trending source needs both — the refresh_token in
          # YOUTUBE_TOKEN_JSON plus the client_id/secret in
          # YOUTUBE_CLIENT_SECRETS_JSON, to mint a fresh access token.
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
        run: python scripts/scout_sources.py

      - name: Commit results
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/scouted_sources.json state/scout_errors.log
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            count=$(python3 -c "import json; print(json.load(open('state/scouted_sources.json'))['total'])")
            git commit -m "scout: $(date -u +%Y-%m-%d) — $count posts"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Comment on tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f state/scouted_sources.json ]; then
            echo "no output file"; exit 0
          fi
          {
            echo "## Scout results — $(date -u +%Y-%m-%d)"
            echo ""
            python3 scripts/scout_report.py
          } > /tmp/scout_comment.md
          gh issue comment 1 \
            --repo "${{ github.repository }}" \
            --body-file /tmp/scout_comment.md
