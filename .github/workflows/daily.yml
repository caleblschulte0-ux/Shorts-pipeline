name: Daily Shorts

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many shorts to publish'
        required: false
        default: '6'
      force:
        description: 'Bypass 6-hour duplicate-trigger guard (--force-rerun, keeps pre-written packages)'
        required: false
        type: boolean
        default: false
      no_schedule:
        description: 'Publish immediately, skip scheduling (--no-schedule)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Render only, do NOT upload (--dry-run). For testing.'
        required: false
        type: boolean
        default: false
  # Auto-fire when the auto-merge workflow finishes a claude/* PR.
  # GitHub blocks GITHUB_TOKEN-attributed pushes from firing other
  # workflows (anti-recursion), so the push-paths trigger below never
  # fired after auto-merge. workflow_run on the merge workflow side-
  # steps that — daily.yml runs when auto-merge.yml completes
  # successfully, regardless of who attributed the resulting push.
  workflow_run:
    workflows: ["Auto-merge claude PRs"]
    types: [completed]
    branches: [main]
  # Belt-and-suspenders. If someone pushes packages directly to main
  # (bypassing the PR/auto-merge path), this picks it up. No-ops when
  # the orchestrator's "already posted today" check sees a fresh run.
  push:
    branches: [main]
    paths:
      - 'state/trending_packages/**'
      - '.github/triggers/daily'

permissions:
  contents: write   # commit posted_log + failure_count + reports
  issues: write     # post the daily report comment

env:
  PYTHON_VERSION: '3.11'
  # Number of the tracking issue the action comments on. Created once;
  # update via repo variable REPORT_ISSUE_NUMBER if needed.
  REPORT_ISSUE_NUMBER: ${{ vars.REPORT_ISSUE_NUMBER || '1' }}

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: daily-shorts
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Pre-flight — kill switch + failure counter
        id: preflight
        run: |
          set -e
          if [ -f PAUSED ]; then
            echo "skip=manual" >> $GITHUB_OUTPUT
            echo "Pipeline paused: PAUSED file exists in repo root."
            exit 0
          fi
          fc=$(cat state/failure_count.txt 2>/dev/null | tr -d '[:space:]' || echo 0)
          echo "Failure count: $fc"
          if [ "$fc" -ge 2 ]; then
            echo "skip=auto" >> $GITHUB_OUTPUT
            echo "Pipeline auto-paused: 2+ failures in a row. Reset state/failure_count.txt to resume."
          else
            echo "skip=" >> $GITHUB_OUTPUT
          fi

      - name: Notify (skipped run)
        if: steps.preflight.outputs.skip != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SKIP_REASON: ${{ steps.preflight.outputs.skip }}
        run: |
          if [ "$SKIP_REASON" = "manual" ]; then
            REASON="manual pause (PAUSED file present in repo root)"
          else
            REASON="auto-pause (state/failure_count.txt >= 2 — 2 days in a row failed)"
          fi
          MSG="Daily shorts run SKIPPED — $REASON. Resume by removing the file (manual) or resetting the counter to 0 (auto)."
          gh issue comment "$REPORT_ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$MSG"
          if [ -n "$NTFY_TOPIC" ]; then
            curl -fsS -d "$MSG" "https://ntfy.sh/$NTFY_TOPIC" \
                 -H "Title: Daily Shorts Paused" \
                 -H "Tags: pause_button"
          fi

      - name: Stop here if skipped
        if: steps.preflight.outputs.skip != ''
        run: exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system deps
        run: |
          # The hosted runner ships a Microsoft apt repo whose signing key
          # intermittently breaks ("no longer signed"), failing apt-get update
          # with exit 100. We don't need it — drop it, tolerate residual update
          # errors, then install ffmpeg from the Ubuntu repos.
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list \
                     /etc/apt/sources.list.d/*microsoft* 2>/dev/null || true
          sudo apt-get update -qq || sudo apt-get update -qq || true
          sudo apt-get install -y -q ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Kokoro TTS models (~350MB)
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-v1.0

      - name: Download Kokoro TTS models if cache miss
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro_models
          curl -fsSL -o kokoro_models/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          curl -fsSL -o kokoro_models/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"
          ls -lh kokoro_models/

      # Gameplay clips are large (50MB+) and totally static — cache
      # them so the daily run doesn't re-download from archive.org
      # every morning. The cache key matches whatever the current
      # seed_gameplay.py SEEDS list hashes to, so swapping a clip
      # invalidates automatically.
      - name: Cache gameplay clips
        id: cache-gameplay
        uses: actions/cache@v4
        with:
          path: gameplay/
          key: gameplay-${{ hashFiles('seed_gameplay.py') }}

      - name: Seed gameplay clips
        run: |
          python seed_gameplay.py

      - name: Verify required secrets are set
        env:
          YT_CLIENT: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ: ${{ secrets.GROQ_API_KEY }}
          PEXELS: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          missing=0
          [ -z "$YT_CLIENT" ] && { echo "::error::missing secret YOUTUBE_CLIENT_SECRETS_JSON"; missing=1; }
          [ -z "$YT_TOKEN" ] && { echo "::error::missing secret YOUTUBE_TOKEN_JSON"; missing=1; }
          [ -z "$GROQ" ] && { echo "::error::missing secret GROQ_API_KEY (free key at https://console.groq.com/keys)"; missing=1; }
          [ -z "$PEXELS" ] && { echo "::error::missing secret PEXELS_API_KEY"; missing=1; }
          [ -z "$PIXABAY" ] && { echo "::error::missing secret PIXABAY_API_KEY"; missing=1; }
          [ $missing -ne 0 ] && exit 1
          echo "Secrets present."

      # THE BRAIN. Headless Claude authors the day's packages per the
      # Schulte Media playbook BEFORE render, so we never silently fall to
      # the weak Groq writer. Non-fatal + time-boxed: if the token is
      # missing or it errors, we log LOUDLY and the orchestrator proceeds
      # (prewritten if present, else Groq — which now warns).
      - name: Brain — author today's packages (Claude)
        if: steps.preflight.outputs.skip == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set +e
          TODAY=$(date -u +%Y%m%d)
          DIR="state/trending_packages/$TODAY"
          if ls "$DIR"/*.json >/dev/null 2>&1; then
            echo "brain: $DIR already has hand-authored packages — leaving them."; exit 0
          fi
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::warning::BRAIN SKIPPED — CLAUDE_CODE_OAUTH_TOKEN not set; run will fall to Groq."; exit 0
          fi
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || { echo "::warning::BRAIN — claude-code install failed; falling to Groq."; exit 0; }
          mkdir -p "$DIR"
          cat > "$RUNNER_TEMP/brain_prompt.txt" <<EOF
          You are the Schulte Media BRAIN, running headless in CI before render. Author today's 6 video packages into the directory: $DIR

          READ FIRST and treat as law:
          - data_learning/SCHULTE_MEDIA_BRAIN.md  (playbook: identity, iron gate, hooks, retention doctrine)
          - data_learning/LEARNING_LOOP.md         (how to read analytics)
          - state/scouted_sources.json             (today's raw trending material — derive angles from THIS)
          - state/analytics/latest.json            (what is winning — lean into high-retention topics; animals win)
          - state/posted_log.json                  (do NOT reuse a subject/title posted recently)

          DOCTRINE (enforce):
          - Niche: animal encounters / showdowns / "nature is metal" (the channel's proven winners).
          - IRON GATE: every story is a vivid question with >=3 concrete visual beats, or it's rejected.
          - OPEN-LOOP HOOKS: the title and first line WITHHOLD the answer (e.g. "The one animal a great white shark runs from..." — do not say "orca" until seconds in).
          - First line = proof/intrigue, never setup. Noun-heavy, picturable script, ~100-115 words, ends on a question.

          WRITE 6 files named 01_<slug>.json ... 06_<slug>.json, EXACT schema:
          {"version":1,"slug":"kebab-unique","title":"open-loop title","hashtags":["10-12 lowercase no #"],"script":"~100-115 words one paragraph ending in a question","shots":[{"phrase":"EXACT substring of script","image_url":"optional Commons Special:FilePath URL","query":"stock phrase","mascot_pose":"shock|point|idle"}],"punches":[{"phrase":"EXACT substring of script","text":"SHORT CAPS","color":"#ff3030"}],"music_vibe":"dark|tense|epic|hype"}
          7-8 shots and 4 punches per file.

          HARD RULES — verify with Bash/python BEFORE finishing, fix any failure:
          1. Every shot.phrase and punch.phrase MUST be an exact substring of that file's script.
          2. Pin a Wikimedia Commons hero image on ~4 shots per file, form https://commons.wikimedia.org/wiki/Special:FilePath/<File> . VERIFY each: curl -s -o /dev/null -w "%{http_code}" -L "<url>" must print 200; drop any that isn't 200 (leave that shot with only a query).
          3. Each file parses as valid JSON. Exactly 6 files.

          Finish by printing the 6 titles and confirming all substring + image-200 checks passed.
          EOF
          echo "brain: authoring into $DIR ..."
          claude -p "$(cat "$RUNNER_TEMP/brain_prompt.txt")" \
            --allowedTools "Read,Write,Edit,Bash" \
            --permission-mode acceptEdits \
            --model "${BRAIN_MODEL:-sonnet}" \
            --output-format text 2>&1 | tail -40 || echo "::warning::BRAIN run errored (non-fatal)."
          N=$(ls "$DIR"/*.json 2>/dev/null | wc -l)
          echo "brain: authored $N package(s)"
          [ "$N" -eq 0 ] && echo "::warning::BRAIN produced 0 packages; run will fall to Groq."
          exit 0

      - name: Run daily orchestrator
        id: run
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          # Per-channel tokens. Each one corresponds to a channel slug
          # that packages can set via the `channel` field. Empty/missing
          # in the package routes to the default (YOUTUBE_TOKEN_JSON).
          # Add a new line per new channel; secrets that aren't set in
          # the repo just become empty strings and the orchestrator's
          # error message tells you which one is missing.
          YOUTUBE_TOKEN_JSON_EXPLAINER: ${{ secrets.YOUTUBE_TOKEN_JSON_EXPLAINER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional: enables Gemini assists — custom thumbnails, shot
          # image backfill (free image models only), and vision QA on the
          # finished video. Skips silently if unset, so it's not in the
          # required-secrets preflight.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Optional: when set, topic_video pulls from Vimeo's CC pool
          # alongside Commons / NASA / Archive / news embeds. Skips
          # silently if unset, so this isn't in the required-secrets
          # preflight check above.
          VIMEO_TOKEN: ${{ secrets.VIMEO_TOKEN }}
          # Optional: enables topic_video Source 5 — YouTube Data API
          # search.list?videoLicense=creativeCommon. CC-BY clips are
          # explicitly licensed for commercial reuse; Content ID does
          # not strike on creator-opted-in CC matches. ~100 quota units
          # per call, well within the 10K daily limit. Skips silently
          # if unset.
          #
          # Separate from YOUTUBE_TOKEN_JSON above: that's the OAuth
          # token for uploading. This is a server API key for reading
          # the public catalog. Create at
          # https://console.cloud.google.com/apis/credentials.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Optional: when set, topic_video pulls from DVIDS
          # (Defense Visual Information Distribution Service) for
          # federal-PD video footage — Coast Guard rescues, hurricane
          # response, NATO exercises, White House press pool. All
          # 17 U.S.C. § 105 public domain, zero copyright risk. Free
          # registration at https://www.dvidshub.net/api/. Skips
          # silently if unset.
          DVIDS_API_KEY: ${{ secrets.DVIDS_API_KEY }}
          # News-image funnel keys (media_funnel.py). All free tiers,
          # all no-credit-card required. Each provider skips silently
          # if its secret is unset, so the render still works without
          # them — but the relevance gate will start failing renders
          # whose imagery falls through to generic stock, so the
          # daily output stays gated by the funnel's coverage.
          # Sign up:
          #   https://newsapi.org/register
          #   https://gnews.io/  (free dev tier)
          #   https://brave.com/search/api/  (free 2k/mo)
          #   https://tavily.com/  (free 1k/mo)
          #   https://newsdata.io/register
          #   https://api.imgur.com/oauth2/addclient  (anonymous app)
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          BRAVE_KEY: ${{ secrets.BRAVE_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          NEWSDATA_KEY: ${{ secrets.NEWSDATA_KEY }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          # Opt-in: when set to "1", topic_video Source 8 pulls trending
          # video from YouTube WITHOUT the CC license filter — relying on
          # fair-use commentary doctrine. Read as a repo Variable (not a
          # Secret) since it's just an on/off flag. Set at:
          # https://github.com/caleblschulte0-ux/Shorts-pipeline/settings/variables/actions
          # Off = empty string; the topic_video code checks for == "1".
          # YouTube Content ID is automated and can demonetize / strike
          # broadcaster clips; our pipeline's transformation (TTS voice
          # over, stacked layout, captions, 2-second sub-cuts) is the
          # fair-use defense.
          TOPIC_VIDEO_ALLOW_STRIKES: ${{ vars.TOPIC_VIDEO_ALLOW_STRIKES }}
          KOKORO_VOICE: ${{ vars.KOKORO_VOICE || 'am_adam' }}
          COUNT: ${{ github.event.inputs.count || '6' }}
          FORCE: ${{ github.event.inputs.force }}
          NO_SCHEDULE: ${{ github.event.inputs.no_schedule }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--count $COUNT"
          if [ "$FORCE" = "true" ]; then ARGS="$ARGS --force-rerun"; fi
          if [ "$NO_SCHEDULE" = "true" ]; then ARGS="$ARGS --no-schedule"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "Running: python scripts/run_trending_daily.py $ARGS"
          python scripts/run_trending_daily.py $ARGS

      # Dry-run only: keep the rendered mp4s as a downloadable artifact so a
      # full composited video can be reviewed without uploading anywhere.
      - name: Upload rendered videos (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-videos
          path: output/*.mp4
          retention-days: 5
          if-no-files-found: warn

      - name: Update failure counter
        if: always() && steps.preflight.outputs.skip == ''
        run: |
          mkdir -p state
          if [ "${{ steps.run.outcome }}" = "success" ]; then
            echo "0" > state/failure_count.txt
            echo "Run OK — counter reset."
          else
            fc=$(cat state/failure_count.txt 2>/dev/null | tr -d '[:space:]' || echo 0)
            new=$((fc + 1))
            echo "$new" > state/failure_count.txt
            echo "::warning::Run failed — failure counter now $new (auto-pause at 2)."
          fi

      - name: Fetch analytics snapshot
        # Pulls views/likes/comments for every uploaded video in the last
        # 30 days, writes state/analytics/<today>.json + latest.json.
        # Tomorrow's routine reads latest.json to learn what's working.
        # Costs ~5 quota units (vs 9.6K for uploads), safe against the
        # 10K daily limit. Skipped on a failed orchestrator run since
        # the new uploads wouldn't be queryable yet.
        if: steps.preflight.outputs.skip == '' && steps.run.outcome == 'success'
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          python3 scripts/fetch_analytics.py --max-age-days 30

      - name: Commit log + counter + report
        if: always() && steps.preflight.outputs.skip == ''
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ daily_report.md daily_report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "daily: $(date -u +%Y-%m-%d) report + state"
          # Scout and earlier daily runs both push to state/ and to the
          # report files. On a race, the rebase needs an automatic
          # conflict resolution — `-X ours` keeps OUR fresh report and
          # posted_log (they're regenerated every run from scratch, so
          # losing the prior version is fine — we'd rather overwrite
          # than fail the whole workflow on a textual conflict).
          for i in 1 2 3 4 5; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing (ours)..."
            # Capture our fresh commit's SHA so we can cherry-pick its
            # tree back after the hard reset in the recovery path
            # below. Without this safeguard, `git reset --hard` silently
            # wiped the orchestrator's fresh daily_report + posted_log
            # — the re-stage step found no diff against origin/main, the
            # commit became empty, the push became a no-op, and the
            # YouTube uploads were stranded with no source-of-truth entry.
            our_sha=$(git rev-parse HEAD)
            git pull --rebase -X ours origin ${{ github.ref_name }} || {
              echo "Rebase still conflicted — aborting + cherry-picking ours."
              git rebase --abort || true
              git fetch origin ${{ github.ref_name }}
              git reset --hard origin/${{ github.ref_name }}
              # Cherry-pick the original commit's tree state onto the
              # remote-advanced base. -X theirs (the perspective flipped
              # after the reset) keeps OUR file content on any conflict
              # against the remote's drift.
              git cherry-pick --no-commit -X theirs "$our_sha" || true
              git add state/ daily_report.md daily_report.json 2>/dev/null || true
              git commit -m "daily: $(date -u +%Y-%m-%d) report + state (retry $i)" || true
            }
            sleep 2
          done
          echo "::error::Failed to push state after 5 attempts"
          exit 1

      - name: Post report to tracking issue
        if: always() && steps.preflight.outputs.skip == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f daily_report.md ]; then
            gh issue comment "$REPORT_ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file daily_report.md
          else
            gh issue comment "$REPORT_ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "Daily run did not produce a report. Check the action logs."
          fi

      - name: Push notification via ntfy
        if: always() && steps.preflight.outputs.skip == ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RUN_OUTCOME: ${{ steps.run.outcome }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC not set — skipping ntfy push."
            exit 0
          fi
          if [ "$RUN_OUTCOME" = "success" ]; then
            TITLE="Daily shorts posted"
            TAG="white_check_mark"
          else
            TITLE="Daily shorts FAILED"
            TAG="rotating_light"
          fi
          # First ~12 lines of the report = headline + per-post lines
          MSG=$(head -20 daily_report.md 2>/dev/null || echo "no report")
          curl -fsS -d "$MSG" "https://ntfy.sh/$NTFY_TOPIC" \
               -H "Title: $TITLE" \
               -H "Tags: $TAG" \
               -H "Click: https://github.com/${{ github.repository }}/issues/$REPORT_ISSUE_NUMBER"

      - name: Reflect orchestrator result
        if: steps.preflight.outputs.skip == ''
        run: |
          if [ "${{ steps.run.outcome }}" != "success" ]; then
            exit 1
          fi
